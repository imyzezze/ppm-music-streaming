{% extends 'music/base.html' %}

{% block title %}Profile - Music Streaming{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h1 class="mb-4">My Profile</h1>
                
                <div class="mb-4">
                    <p class="text-muted">
                        <strong>Username:</strong> {{ user.username }}
                    </p>
                    <p class="text-muted">
                        <strong>Email:</strong> {{ user.email }}
                    </p>
                    <p class="text-muted">
                        <strong>Role:</strong> 
                        <span class="badge bg-info">{{ user.get_role_display }}</span>
                    </p>
                </div>
                
                <hr>
                
                <div class="mt-4">
                    <a href="{% url 'music:home' %}" class="btn btn-primary">Back to Home</a>
                    <a href="{% url 'music:logout' %}" class="btn btn-outline-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
